.k8s_basic_job: &k8s_basic_job
  tags:
    - k8s-basic
  image: "${DOCKER_ACCESS_URL}/other/dockerdev/documentation:latest"
  timeout: 10 minutes
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# Reusable git configuration
.git_setup: &git_setup
  - export HOME=/tmp
  - git config --global user.email "ci-bot@gitlab.com"
  - git config --global user.name "CI Bot"

variables:
  DEFAULT_REVIEWER_ID: "162"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "main"'

stages:
  - notify
  - update-docs
  - release

# ─────────────────────────────────────────
# 1. Add reviewer on every MR targeting main
# ─────────────────────────────────────────
add-reviewer:
  <<: *k8s_basic_job
  stage: notify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
  script:
    - export HOME=/tmp
    - |
      if [ -z "$GITLAB_TOKEN" ]; then
        echo "ERROR: GITLAB_TOKEN is not available."
        echo "This variable must be set in CI/CD settings and NOT marked as 'Protected'"
        echo "(Protected variables are only available on protected branches, not MR pipelines)"
        exit 1
      fi
      curl --fail \
        -X PUT \
        -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        -H "Content-Type: application/json" \
        "https://gitlab.aimms.com/api/v4/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID" \
        -d "{\"reviewer_ids\": [$DEFAULT_REVIEWER_ID]}"

# ─────────────────────────────────────────
# 2a. Update README badges (on tag push)
# ─────────────────────────────────────────
update-readme:
  <<: *k8s_basic_job
  stage: update-docs
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - *git_setup
    - git remote set-url origin "${CI_REPOSITORY_URL}"
    - |
      TAG=$CI_COMMIT_TAG

      # Find AIMMS file (search recursively, must be unique)
      AIMMS_FILES=$(find . -name "*.aimms" -type f)
      AIMMS_COUNT=$(echo "$AIMMS_FILES" | grep -c '.' || true)
      if [ -z "$AIMMS_FILES" ] || [ "$AIMMS_COUNT" -eq 0 ]; then
        echo "ERROR: No .aimms file found"
        exit 1
      fi
      if [ "$AIMMS_COUNT" -gt 1 ]; then
        echo "ERROR: Multiple .aimms files found, cannot determine which to use:"
        echo "$AIMMS_FILES"
        exit 1
      fi
      AIMMS_FILE="$AIMMS_FILES"
      echo "Found AIMMS file: $AIMMS_FILE"

      # Extract AIMMS version
      AIMMS_VERSION=$(grep -oE 'AIMMS_Version="[0-9]+\.[0-9]+' "$AIMMS_FILE" | grep -oE '[0-9]+\.[0-9]+$' || true)

      if [ -z "$AIMMS_VERSION" ]; then
        echo "ERROR: Could not extract AIMMS version from $AIMMS_FILE"
        exit 1
      fi

      echo "AIMMS: $AIMMS_VERSION"

      # Update AIMMS badge
      sed -i "s|AIMMS-[0-9.]*-white|AIMMS-${AIMMS_VERSION}-white|g" README.md

      # Update a badge for each RepositoryLibrary found in the .aimms file
      grep 'RepositoryLibrary' "$AIMMS_FILE" | while read -r line; do
        LIB_NAME=$(echo "$line" | grep -oE 'Name="[^"]*"' | cut -d'"' -f2)
        LIB_VERSION=$(echo "$line" | grep -oE 'Version="[^"]*"' | cut -d'"' -f2)
        if [ -n "$LIB_NAME" ] && [ -n "$LIB_VERSION" ]; then
          echo "Library: $LIB_NAME $LIB_VERSION"
          sed -i "s|${LIB_NAME}-[0-9.]*-white|${LIB_NAME}-${LIB_VERSION}-white|g" README.md
        fi
      done

      # Commit only if there are changes
      git add README.md
      if git diff --cached --quiet; then
        echo "No changes to commit"
      else
        git commit -m "chore: update README badges for $TAG [skip ci]"
        git push origin HEAD:main || {
          echo "Push failed, attempting rebase..."
          git pull --rebase origin main
          git push origin HEAD:main
        }
      fi

# ─────────────────────────────────────────
# 2b. Create MR in how-to repo (on tag push)
#
# Requires CI/CD variable RST_ARTICLE_ID set per project
# (e.g. RST_ARTICLE_ID=383). This is used to locate the
# correct .rst file in the how-to repo and avoids matching
# the wrong article when the repo name differs from the
# article filename.
# ─────────────────────────────────────────
update-howto:
  <<: *k8s_basic_job
  stage: update-docs
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - *git_setup
    - |
      TAG=$CI_COMMIT_TAG
      TODAY=$(date +"%d/%m/%Y")
      REPO_NAME="${CI_PROJECT_NAME}"

      # Validate RST_ARTICLE_ID
      if [ -z "$RST_ARTICLE_ID" ]; then
        echo "ERROR: RST_ARTICLE_ID is not set."
        echo "Add it as a CI/CD variable in Settings > CI/CD > Variables"
        echo "It should be the article number in the how-to repo (e.g. 383)"
        exit 1
      fi

      # Generate changelog
      PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
      if [ -n "$PREV_TAG" ]; then
        COMMITS=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"%s" --no-merges)
      else
        COMMITS=$(git log "${TAG}" --pretty=format:"%s" --no-merges -n 20)
        echo "NOTE: First release, showing last 20 commits only"
      fi
      COMMIT_LINE=$(echo "$COMMITS" | tr '\n' ';' | sed 's/;$//' | sed 's/;/. /g')

      # Clone how-to repo
      HOW_TO_REPO="gitlab.aimms.com/aimms/doc/aimms-how-to.git"
      git clone "https://oauth2:${GITLAB_TOKEN}@${HOW_TO_REPO}" how-to-repo
      cd how-to-repo

      # Find RST file using the article ID
      RST_FILE=$(find . -path "./Articles/${RST_ARTICLE_ID}/*.rst" | head -n1)
      if [ -z "$RST_FILE" ]; then
        echo "ERROR: No .rst file found in Articles/${RST_ARTICLE_ID}/"
        echo "Check that RST_ARTICLE_ID=$RST_ARTICLE_ID is correct"
        exit 1
      fi
      echo "RST file: $RST_FILE"

      # Create branch with unique name (includes tag)
      RST_BASENAME=$(basename "$RST_FILE" .rst)
      BRANCH="project-release/${RST_BASENAME}-${TAG}"

      # Check if branch already exists, checkout before modifying files
      git fetch origin
      if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
        echo "Branch $BRANCH already exists, checking out"
        git checkout -B "$BRANCH" "origin/$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi

      # Set up environment for Python script
      GITHUB_RELEASE_URL="https://github.com/${GITHUB_ORG}/${REPO_NAME}/releases/download/${TAG}/${REPO_NAME}.zip"
      export RST_FILE TAG TODAY COMMIT_LINE GITHUB_RELEASE_URL BRANCH REPO_NAME

      # Run the update script from the original repo
      python3 "${CI_PROJECT_DIR}/scripts/update_rst.py"

      git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${HOW_TO_REPO}"
      git add "$RST_FILE"
      git commit -m "chore: add changelog entry for ${REPO_NAME} $TAG" || {
        echo "No changes to commit (entry may already exist)"
        exit 0
      }
      git push origin "$BRANCH"

      # Get project ID
      HOW_TO_PROJECT_ID=$(curl --silent \
        -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        "https://gitlab.aimms.com/api/v4/projects/aimms%2Fdoc%2Faimms-how-to" \
        | grep -o '"id":[0-9]*' | head -n1 | cut -d':' -f2 || true)

      if [ -z "$HOW_TO_PROJECT_ID" ] || [ "$HOW_TO_PROJECT_ID" = "null" ]; then
        echo "ERROR: Could not get how-to project ID"
        exit 1
      fi

      # Check if MR already exists
      EXISTING_MR=$(curl --silent \
        -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        "https://gitlab.aimms.com/api/v4/projects/${HOW_TO_PROJECT_ID}/merge_requests?source_branch=${BRANCH}&state=opened" \
        | grep -o '"iid":[0-9]*' | wc -l || true)

      if [ "$EXISTING_MR" -gt 0 ]; then
        echo "MR already exists for branch $BRANCH, skipping"
        exit 0
      fi

      # Create MR payload using python3 for proper JSON encoding
      MR_DATA=$(python3 -c "import json, os; d={'source_branch':os.environ['BRANCH'],'target_branch':'master','title':'chore: add changelog entry for {} {}'.format(os.environ['REPO_NAME'],os.environ['TAG']),'description':'Automated changelog update generated by CI pipeline.\n\nProject: {}\nTag: {}\nDate: {}'.format(os.environ['REPO_NAME'],os.environ['TAG'],os.environ['TODAY']),'reviewer_ids':[int(os.environ['DEFAULT_REVIEWER_ID'])]}; print(json.dumps(d))")

      curl --fail \
        -X POST \
        -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        -H "Content-Type: application/json" \
        "https://gitlab.aimms.com/api/v4/projects/${HOW_TO_PROJECT_ID}/merge_requests" \
        -d "$MR_DATA"

# ─────────────────────────────────────────
# 3. Create GitHub release with zip
# ─────────────────────────────────────────
github-release:
  <<: *k8s_basic_job
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG'
  artifacts:
    when: always
    paths:
      - "*.zip"
    expire_in: 1 week
  script:
    - |
      TAG=$CI_COMMIT_TAG
      REPO_NAME="${CI_PROJECT_NAME}"
      REPO="$GITHUB_ORG/$REPO_NAME"
      export TAG REPO_NAME

      # Generate changelog
      PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
      if [ -n "$PREV_TAG" ]; then
        CHANGELOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges)
      else
        CHANGELOG=$(git log "${TAG}" --pretty=format:"- %s" --no-merges -n 20)
      fi

      # Create zip using git archive (respects .gitignore)
      ZIP_NAME="${REPO_NAME}.zip"
      git archive --format=zip --prefix="${REPO_NAME}/" -o "$ZIP_NAME" HEAD

      # Create release payload using python3 for proper JSON encoding
      RELEASE_DATA=$(CHANGELOG_ENV="$CHANGELOG" python3 -c "import json, os; d={'tag_name':os.environ['TAG'],'name':'Release '+os.environ['TAG'],'body':os.environ['CHANGELOG_ENV'],'draft':False,'prerelease':False}; print(json.dumps(d))")

      RELEASE_RESPONSE=$(curl --silent --fail \
        -X POST \
        -H "Authorization: Bearer $GITHUB_TOKEN" \
        -H "Content-Type: application/json" \
        "https://api.github.com/repos/$REPO/releases" \
        -d "$RELEASE_DATA")

      UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | grep -o '"upload_url":[[:space:]]*"[^"]*"' | grep -o '"https://[^"]*"' | tr -d '"' | sed 's/{?name,label}//' || true)

      if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
        echo "ERROR: Could not get upload URL from release response"
        exit 1
      fi

      curl --silent --fail \
        -X POST \
        -H "Authorization: Bearer $GITHUB_TOKEN" \
        -H "Content-Type: application/zip" \
        --data-binary @"$ZIP_NAME" \
        "${UPLOAD_URL}?name=${ZIP_NAME}"